<!DOCTYPE html>
<html>
<head>
  <title>Bootstrap Calculator</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex justify-content-center align-items-center" style="height:100vh;">

  <div class="card p-3" style="width:250px;">
    
    <input type="text" id="d" class="form-control mb-2 text-end" disabled>

    <div class="d-grid gap-2">
      
      <div class="btn-group">
        <button class="btn btn-secondary" onclick="add('7')">7</button>
        <button class="btn btn-secondary" onclick="add('8')">8</button>
        <button class="btn btn-secondary" onclick="add('9')">9</button>
        <button class="btn btn-primary" onclick="add('/')">/</button>
      </div>

      <div class="btn-group">
        <button class="btn btn-secondary" onclick="add('4')">4</button>
        <button class="btn btn-secondary" onclick="add('5')">5</button>
        <button class="btn btn-secondary" onclick="add('6')">6</button>
        <button class="btn btn-primary" onclick="add('*')">*</button>
      </div>

      <div class="btn-group">
        <button class="btn btn-secondary" onclick="add('1')">1</button>
        <button class="btn btn-secondary" onclick="add('2')">2</button>
        <button class="btn btn-secondary" onclick="add('3')">3</button>
        <button class="btn btn-primary" onclick="add('-')">-</button>
      </div>

      <div class="btn-group">
        <button class="btn btn-secondary" onclick="add('0')">0</button>
        <button class="btn btn-secondary" onclick="add('.')">.</button>
        <button class="btn btn-danger" onclick="clr()">C</button>
        <button class="btn btn-primary" onclick="add('+')">+</button>
      </div>

      <div class="btn-group">
        <button class="btn btn-warning" onclick="back()"><i class="fa-solid fa-delete-left" style="color: rgb(193, 5, 5);"></i></button>
        <button class="btn btn-success w-100" onclick="cal()">=</button>
      </div>

    </div>
  </div>

<script>
function add(v){
  document.getElementById("d").value += v;
}

function clr(){
  document.getElementById("d").value = "";
}

function back(){
  let x = document.getElementById("d").value;
  document.getElementById("d").value = x.slice(0,-1);
}

function cal(){
  try{
    document.getElementById("d").value = eval(document.getElementById("d").value);
  }catch{
    document.getElementById("d").value = "Error";
  }
}
</script>

</body>
</html>
